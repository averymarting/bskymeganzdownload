name: Scrape item-post images and upload to Mega.nz
on:
  workflow_dispatch:
    inputs:
      page_url:
        description: "Page URL to scrape (.item-post img elements)"
        required: true
        type: string
      mega_folder_name:
        description: "Mega.nz folder path to save images into"
        required: true
        type: string
      max_idle_scrolls:
        description: "Stop after this many scrolls with no new images"
        required: false
        default: "8"
        type: string
      max_images:
        description: "Optional: max number of images to scrape (leave blank to scrape until 8 idle scrolls)"
        required: false
        default: ""
        type: string
      spreadsheet_id:
        description: "(optional) Google Sheet ID to log File Name + Caption into"
        required: false
        default: "1OQns3xUPeTQslsw0FaD-a85DAM0Sc_L6BnaGDMqGPmY"
        type: string
      sheet_tab:
        description: "(optional) Force a specific tab name — leave blank to auto-use the Mega folder name as the tab"
        required: false
        default: ""
        type: string
      download_concurrency:
        description: "How many images to download in parallel"
        required: false
        default: "10"
        type: string
      upload_transfers:
        description: "How many files rclone uploads to Mega in parallel"
        required: false
        default: "8"
        type: string
jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version
      - name: Write rclone config file
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: printf '%s' "$RCLONE_CONF" > rclone.conf
      - name: Write Google credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > google_creds.json
      - name: Run scraper + Mega uploader
        env:
          PAGE_URL: ${{ inputs.page_url }}
          MEGA_FOLDER_NAME: ${{ inputs.mega_folder_name }}
          MAX_IDLE_SCROLLS: ${{ inputs.max_idle_scrolls }}
          MAX_IMAGES: ${{ inputs.max_images }}
          SPREADSHEET_ID: ${{ inputs.spreadsheet_id }}
          SHEET_TAB: ${{ inputs.sheet_tab }}
          DOWNLOAD_CONCURRENCY: ${{ inputs.download_concurrency }}
          RCLONE_CONFIG_PATH: rclone.conf
          RCLONE_REMOTE_NAME: mega
          GOOGLE_APPLICATION_CREDENTIALS: google_creds.json
          PYTHONUNBUFFERED: "1"
        run: python -u scrape_upload.py
      - name: Clean up credentials files
        if: always()
        run: rm -f google_creds.json rclone.conf
      - name: Upload run log as artifact (optional debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-images
          path: downloaded_images/
          if-no-files-found: ignore
